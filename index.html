<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yavuz Rulman - Profesyonel Ürün Kataloğu</title>
    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --dark-blue: #0f172a;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 15px -3px rgba(15, 23, 42, 0.05), 0 4px 6px -4px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .header-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo svg {
            width: 46px;
            height: 46px;
            transition: transform 0.5s ease;
        }

        .logo:hover svg {
            transform: rotate(180deg);
        }

        .logo h1 {
            color: var(--dark-blue);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
        }
        
        .logo h1 span {
            color: var(--primary);
            font-weight: 400;
        }

        .search-box {
            flex: 1;
            max-width: 550px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.85rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            color: var(--dark-blue);
            background-color: #f1f5f9;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            background-color: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .main-container {
            max-width: 1440px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2.5rem;
            width: 100%;
            flex: 1;
        }

        .sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            height: fit-content;
            position: sticky;
            top: 110px;
            box-shadow: var(--shadow-sm);
        }

        .filter-section {
            margin-bottom: 2rem;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-section h3 {
            font-size: 1rem;
            color: var(--dark-blue);
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .filter-list::-webkit-scrollbar {
            width: 5px;
        }
        .filter-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.45rem 0.6rem;
            border-radius: var(--radius-md);
            font-size: 0.92rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .filter-item:hover {
            background-color: #f1f5f9;
            color: var(--primary);
        }

        .filter-item input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.75rem;
            align-content: start;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary-light);
            font-weight: 700;
            background: rgba(59, 130, 246, 0.08);
            padding: 0.25rem 0.6rem;
            border-radius: 50px;
            width: fit-content;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-blue);
            line-height: 1.3;
        }

        .product-specs {
            background-color: #f8fafc;
            padding: 0.85rem;
            border-radius: var(--radius-md);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            border: 1px solid #f1f5f9;
        }

        .spec-item {
            text-align: center;
        }

        .spec-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .spec-value {
            font-weight: 700;
            color: var(--dark-blue);
            font-size: 0.88rem;
        }

        .product-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;
        }

        .product-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--dark-blue);
        }

        .stock-badge {
            font-size: 0.78rem;
            padding: 0.35rem 0.75rem;
            border-radius: 6px;
            font-weight: 700;
        }

        .stock-in { background-color: #dcfce7; color: #15803d; }
        .stock-out { background-color: #fee2e2; color: #b91c1c; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;
            background: var(--card-bg);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border);
        }

        .whatsapp-btn {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background-color: #25D366;
            color: #ffffff !important;
            text-decoration: none !important;
            padding: 14px 24px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            font-size: 15px;
            font-weight: 700;
            box-shadow: 0 10px 25px rgba(37, 211, 102, 0.3);
            z-index: 9999;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .whatsapp-btn:hover {
            transform: scale(1.05) translateY(-2px);
            background-color: #20ba5a;
            box-shadow: 0 15px 30px rgba(37, 211, 102, 0.4);
        }

        .whatsapp-btn img {
            width: 24px;
            height: 24px;
            margin-right: 12px;
        }

        @media (max-width: 1024px) {
            .main-container {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
            .sidebar {
                position: relative;
                top: 0;
            }
            .header-container {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .logo {
                justify-content: center;
            }
            .search-box {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <a href="#" class="logo">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="42" fill="none" stroke="#3b82f6" stroke-width="7" />
                    <circle cx="50" cy="50" r="24" fill="none" stroke="#0f172a" stroke-width="6" />
                    <circle cx="50" cy="50" r="14" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,3" />
                    <circle cx="50" cy="11" r="5.5" fill="#3b82f6" />
                    <circle cx="77.5" cy="22.5" r="5.5" fill="#3b82f6" />
                    <circle cx="89" cy="50" r="5.5" fill="#3b82f6" />
                    <circle cx="77.5" cy="77.5" r="5.5" fill="#3b82f6" />
                    <circle cx="50" cy="89" r="5.5" fill="#3b82f6" />
                    <circle cx="22.5" cy="77.5" r="5.5" fill="#3b82f6" />
                    <circle cx="11" cy="50" r="5.5" fill="#3b82f6" />
                    <circle cx="22.5" cy="22.5" r="5.5" fill="#3b82f6" />
                </svg>
                <h1>YAVUZ <span>RULMAN</span></h1>
            </a>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Rulman kodu, ölçü veya kategori ara...">
            </div>
        </div>
    </header>

    <div class="main-container">
        <aside class="sidebar">
            <div class="filter-section">
                <h3>Kategoriler</h3>
                <ul class="filter-list" id="categoryFilters"></ul>
            </div>
            <div class="filter-section">
                <h3>İç Çap (mm)</h3>
                <ul class="filter-list" id="icCapFilters"></ul>
            </div>
        </aside>

        <main class="products-grid" id="productsGrid">
            <div class="no-results">Sistem kontrol ediliyor ve ürünler yükleniyor...</div>
        </main>
    </div>

    <script>
        let tumUrunler = [];
        let secilenKategoriler = new Set();
        let secilenIcCaplar = new Set();

        // Yerel bağlama: 'urunler.json' doğrudan index.html ile aynı klasörde aranır.
        async function verileriGetir() {
            try {
                const response = await fetch('urunler.json');
                if (!response.ok) throw new Error('Yükleme hatası: ' + response.statusText);
                tumUrunler = await response.json();
                
                filtreleriOlustur();
                urunleriListele(tumUrunler);
            } catch (error) {
                console.error('Veri Hatası:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="no-results">
                        <strong>Ürünler yüklenirken bir sorun oluştu.</strong><br>
                        <span style="font-size: 0.85rem; color: #ef4444; display: block; margin-top: 10px;">
                            Hata Detayı: ${error.message}
                        </span>
                        <span style="font-size: 0.9rem; display: block; margin-top: 15px; color: var(--text-dark);">
                            Lütfen GitHub deponuzda <strong>urunler.json</strong> dosyasının tam olarak bu index.html dosyasıyla yan yana (aynı klasörde) bulunduğundan emin olun.
                        </span>
                    </div>`;
            }
        }

        function filtreleriOlustur() {
            let digerKategoriler = [...new Set(tumUrunler.map(u => u.kategori).filter(k => k && k !== "Kayışlar"))].sort();
            let kategoriler = ["Kayışlar", ...digerKategoriler];
            const icCaplar = [...new Set(tumUrunler.map(u => Number(u.ic_cap)).filter(n => !isNaN(n)))].sort((a, b) => a - b);

            const catContainer = document.getElementById('categoryFilters');
            catContainer.innerHTML = kategoriler.map(kat => `
                <label class="filter-item">
                    <input type="checkbox" value="${kat}" onchange="kategoriFiltrele(this)">
                    <span>${kat}</span>
                </label>
            `).join('');

            const icContainer = document.getElementById('icCapFilters');
            icContainer.innerHTML = icCaplar.map(cap => `
                <label class="filter-item">
                    <input type="checkbox" value="${cap}" onchange="icCapFiltrele(this)">
                    <span>${cap} mm</span>
                </label>
            `).join('');
        }

        function urunleriListele(urunListesi) {
            const grid = document.getElementById('productsGrid');
            
            if (urunListesi.length === 0) {
                grid.innerHTML = '<div class="no-results">Aradığınız kriterlere veya ölçülere uygun ürün bulunamadı.</div>';
                return;
            }

            grid.innerHTML = urunListesi.map(urun => `
                <div class="product-card">
                    <div class="product-category">${urun.kategori || 'Genel'}</div>
                    <div class="product-title">${urun.ad}</div>
                    <div class="product-specs">
                        <div class="spec-item"><div class="spec-label">İç Çap</div><div class="spec-value">${urun.ic_cap} mm</div></div>
                        <div class="spec-item"><div class="spec-label">Dış Çap</div><div class="spec-value">${urun.dis_cap} mm</div></div>
                        <div class="spec-item"><div class="spec-label">Genişlik</div><div class="spec-value">${urun.genislik || '-'} mm</div></div>
                    </div>
                    <div class="product-footer">
                        <div class="product-price">${Number(urun.fiyat).toLocaleString('tr-TR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} TL</div>
                        <div class="stock-badge ${urun.stok > 0 ? 'stock-in' : 'stock-out'}">
                            ${urun.stok > 0 ? `Stok: ${urun.stok}` : 'Tükendi'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtreleriUygula() {
            const aramaKelimesi = document.getElementById('searchInput').value.toLowerCase().trim();

            const filtrelenmis = tumUrunler.filter(urun => {
                const urunAd = urun.ad ? urun.ad.toLowerCase() : '';
                const urunKat = urun.kategori ? urun.kategori.toLowerCase() : '';

                const adEslesti = urunAd.includes(aramaKelimesi);
                const katEslesti = urunKat.includes(aramaKelimesi);
                const aramaSonuc = adEslesti || katEslesti;

                const kategoriSonuc = secilenKategoriler.size === 0 || secilenKategoriler.has(urun.kategori);
                const icCapSonuc = secilenIcCaplar.size === 0 || secilenIcCaplar.has(Number(urun.ic_cap));

                return aramaSonuc && kategoriSonuc && icCapSonuc;
            });

            urunleriListele(filtrelenmis);
        }

        function kategoriFiltrele(cb) {
            if (cb.checked) secilenKategoriler.add(cb.value);
            else secilenKategoriler.delete(cb.value);
            filtreleriUygula();
        }

        function icCapFiltrele(cb) {
            const sayiDegeri = Number(cb.value);
            if (cb.checked) secilenIcCaplar.add(sayiDegeri);
            else secilenIcCaplar.delete(sayiDegeri);
            filtreleriUygula();
        }

        document.getElementById('searchInput').addEventListener('input', filtreleriUygula);
        verileriGetir();
    </script>

       class="whatsapp-btn" 
       target="_blank" 
       rel="noopener noreferrer">

        WhatsApp Destek
    </a>
</body>
</html>
