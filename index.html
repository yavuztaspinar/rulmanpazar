    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #3b82f6;
            --dark-blue: #0f172a;
            --bg-main: #f8fafc;
            --card-bg: #ffffff;
            --text-dark: #334155;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-md: 10px;
            --radius-lg: 16px;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.05);
            --shadow-md: 0 10px 15px -3px rgba(15, 23, 42, 0.05), 0 4px 6px -4px rgba(15, 23, 42, 0.05);
            --shadow-lg: 0 20px 25px -5px rgba(15, 23, 42, 0.1), 0 8px 10px -6px rgba(15, 23, 42, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .header-container {
            max-width: 1440px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2rem;
        }

        .brand-wrapper {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
        }

        .logo svg {
            width: 46px;
            height: 46px;
            transition: transform 0.5s ease;
        }

        .logo:hover svg {
            transform: rotate(180deg);
        }

        .logo h1 {
            color: var(--dark-blue);
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.04em;
            line-height: 1;
        }
        
        .logo h1 span {
            color: var(--primary);
            font-weight: 400;
        }

        .header-phone {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 700;
            font-size: 1rem;
            background-color: #f1f5f9;
            padding: 0.5rem 1rem;
            border-radius: var(--radius-md);
            transition: all 0.2s ease;
            white-space: nowrap;
        }

        .header-phone:hover {
            background-color: #e2e8f0;
            color: var(--primary);
        }

        .header-phone svg {
            width: 18px;
            height: 18px;
            fill: var(--primary);
        }

        .search-box {
            flex: 1;
            max-width: 550px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.85rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            font-size: 0.95rem;
            color: var(--dark-blue);
            background-color: #f1f5f9;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            background-color: var(--card-bg);
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.15);
        }

        .main-container {
            max-width: 1440px;
            margin: 2rem auto;
            padding: 0 2rem;
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 2.5rem;
            width: 100%;
            flex: 1;
        }

        .sidebar {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.75rem;
            height: fit-content;
            position: sticky;
            top: 110px;
            box-shadow: var(--shadow-sm);
        }

        .filter-section {
            margin-bottom: 2rem;
        }

        .filter-section:last-child {
            margin-bottom: 0;
        }

        .filter-section h3 {
            font-size: 1rem;
            color: var(--dark-blue);
            font-weight: 700;
            margin-bottom: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .filter-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            max-height: 240px;
            overflow-y: auto;
            padding-right: 5px;
        }

        .filter-list::-webkit-scrollbar {
            width: 5px;
        }
        .filter-list::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 10px;
        }

        .filter-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            cursor: pointer;
            padding: 0.45rem 0.6rem;
            border-radius: var(--radius-md);
            font-size: 0.92rem;
            color: var(--text-dark);
            transition: all 0.2s ease;
        }

        .filter-item:hover {
            background-color: #f1f5f9;
            color: var(--primary);
        }

        .filter-item input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
            cursor: pointer;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 1.75rem;
            align-content: start;
        }

        .product-card {
            background-color: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(59, 130, 246, 0.3);
        }

        .product-category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--primary-light);
            font-weight: 700;
            background: rgba(59, 130, 246, 0.08);
            padding: 0.25rem 0.6rem;
            border-radius: 50px;
            width: fit-content;
        }

        .product-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--dark-blue);
            line-height: 1.3;
        }

        .product-specs {
            background-color: #f8fafc;
            padding: 0.85rem;
            border-radius: var(--radius-md);
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.5rem;
            border: 1px solid #f1f5f9;
        }

        .spec-item {
            text-align: center;
        }

        .spec-label {
            color: var(--text-muted);
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 600;
            margin-bottom: 0.15rem;
        }

        .spec-value {
            font-weight: 700;
            color: var(--dark-blue);
            font-size: 0.88rem;
        }

        .product-footer {
            margin-top: auto;

            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid #f1f5f9;

        .product-price {

        .stock-badge {
            font-size: 0.78rem;

        .stock-in { background-color: #dcfce7; color: #15803d; }
        .stock-out { background-color: #fee2e2; color: #b91c1c; }

        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 5rem 2rem;
            color: var(--text-muted);
            font-size: 1.1rem;

    <script>
        let tumUrunler = [];
        let secilenKategoriler = new Set();
        let secilenIcCaplar = new Set();

        async function sistemiBaslat() {
            // MODAL ÇALIŞTIRMA MANTIĞI: Sayfa açıldıktan 800ms sonra modalı göster
            const modal = document.getElementById("welcomeModal");
            const closeBtn = document.getElementById("closeModalBtn");
            
            setTimeout(() => {
                if(modal) modal.classList.add("active");
            }, 800);

            if(closeBtn) {
                closeBtn.addEventListener("click", () => modal.classList.remove("active"));
            }
            if(modal) {
                modal.addEventListener("click", (e) => {
                    if (e.target === modal) modal.classList.remove("active");
                });
            }

            try {
                // Not: Bilgisayarınızda test ederken urunler.json dosyasının aynı klasörde olması gerekir.
                const cevap = await fetch('urunler.json');
                if (!cevap.ok) {
                    throw new Error('JSON yüklenemedi! Durum: ' + cevap.status);
                }
                tumUrunler = await cevap.json();
                filtreleriOlustur();
                urunleriListele(tumUrunler);
            } catch (error) {
                console.error('Sistem Hatası:', error);
                document.getElementById('productsGrid').innerHTML = `
                    <div class="no-results">
                        Veriler yüklenirken bir hata oluştu.<br>
                        <small style="color:#ef4444; font-weight:bold;">${error.message}</small>
                    </div>`;
            }
        }

        function filtreleriOlustur() {
            let digerKategoriler = [...new Set(tumUrunler.map(u => u.kategori).filter(k => k && k !== "Kayışlar"))].sort();
            let kategoriler = ["Kayışlar", ...digerKategoriler];
            const icCaplar = [...new Set(tumUrunler.map(u => Number(u.ic_cap)).filter(n => !isNaN(n) && n > 0))].sort((a, b) => a - b);

            const catContainer = document.getElementById('categoryFilters');
            catContainer.innerHTML = kategoriler.map(kat => `
                <label class="filter-item">
                    <input type="checkbox" value="${kat}" onchange="kategoriFiltrele(this)">
                    <span>${kat}</span>
                </label>
            `).join('');

            const icContainer = document.getElementById('icCapFilters');
            if(icCaplar.length > 0) {
                icContainer.innerHTML = icCaplar.map(cap => `
                    <label class="filter-item">
                        <input type="checkbox" value="${cap}" onchange="icCapFiltrele(this)">
                        <span>${cap} mm</span>
                    </label>
                `).join('');
            } else {
                document.getElementById('icCapFilters').parentNode.style.display = 'none';
            }
        }

        function urunleriListele(urunListesi) {
            const grid = document.getElementById('productsGrid');
            if (urunListesi.length === 0) {
                grid.innerHTML = '<div class="no-results">Aradığınız kriterlere veya ölçülere uygun ürün bulunamadı.</div>';
                return;
            }

            grid.innerHTML = urunListesi.map(urun => `
                <div class="product-card">
                    <div class="product-category">${urun.kategori || 'Genel'}</div>
                    <div class="product-title">${urun.ad}</div>
                    <div class="product-specs">
                        <div class="spec-item"><div class="spec-label">İç Çap</div><div class="spec-value">${urun.ic_cap === '-' ? '-' : urun.ic_cap + ' mm'}</div></div>
                        <div class="spec-item"><div class="spec-label">Dış Çap</div><div class="spec-value">${urun.dis_cap === '-' ? '-' : urun.dis_cap + ' mm'}</div></div>
                        <div class="spec-item"><div class="spec-label">Genişlik</div><div class="spec-value">${urun.genislik || '-'} mm</div></div>
                    </div>
                    <div class="product-footer">
                       <div class="product-price">${Number(urun.fiyat).toLocaleString('de-DE', { minimumFractionDigits: 2, maximumFractionDigits: 2 })} EUR</div>
                        <div class="stock-badge ${urun.stok > 0 ? 'stock-in' : 'stock-out'}">
                            ${urun.stok > 0 ? `Stok: ${urun.stok}` : 'Tükendi'}
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function filtreleriUygula() {
            const aramaKelimesi = document.getElementById('searchInput').value.toLowerCase().trim();
            const filtrelenmis = tumUrunler.filter(urun => {
                const urunAd = urun.ad ? urun.ad.toLowerCase() : '';
                const urunKat = urun.kategori ? urun.kategori.toLowerCase() : '';
                const adEslesti = urunAd.includes(aramaKelimesi);
                const katEslesti = urunKat.includes(aramaKelimesi);
                const aramaSonuc = adEslesti || katEslesti;
                const kategoriSonuc = secilenKategoriler.size === 0 || secilenKategoriler.has(urun.kategori);
                const icCapSonuc = secilenIcCaplar.size === 0 || secilenIcCaplar.has(Number(urun.ic_cap));
                return aramaSonuc && kategoriSonuc && icCapSonuc;
            });
            urunleriListele(filtrelenmis);
        }

        function kategoriFiltrele(cb) {
            if (cb.checked) secilenKategoriler.add(cb.value);
            else secilenKategoriler.delete(cb.value);
            filterleriUygula();
        }

        function icCapFiltrele(cb) {
            const sayiDegeri = Number(cb.value);
            if (cb.checked) secilenIcCaplar.add(sayiDegeri);
            else secilenIcCaplar.delete(sayiDegeri);
            filtreleriUygula();
        }

        document.getElementById('searchInput').addEventListener('input', filtreleriUygula);
        window.addEventListener('DOMContentLoaded', sistemiBaslat);
    </script>
