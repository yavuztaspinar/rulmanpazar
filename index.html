<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yavuz Rulman | Güvenilir Rulman Tedarik Platformu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col justify-between" onload="fetchAndDisplayProducts()">

    <nav class="bg-slate-900 text-white shadow-xl sticky top-0 z-50 px-4 py-4">
        <div class="container mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
            
            <div class="flex items-center gap-3 cursor-pointer" onclick="location.reload()">
                <div class="bg-amber-500 text-slate-900 h-11 w-11 flex items-center justify-center rounded-xl shadow-md">
                    <i class="fa-solid fa-gear text-xl animate-spin" style="animation-duration: 8s;"></i>
                </div>
                <div>
                    <span class="text-2xl font-black tracking-tight text-white">YAVUZ <span class="text-amber-500">RULMAN</span></span>
                    <p class="text-xs text-gray-400 tracking-widest font-semibold uppercase">B4B Entegre Sistemi</p>
                </div>
            </div>

            <div class="flex items-center gap-3">
                <a href="tel:05327600509" class="bg-emerald-600 hover:bg-emerald-500 text-white px-5 py-2.5 rounded-xl font-bold transition-all shadow-md flex items-center gap-2 text-sm">
                    <i class="fa-solid fa-phone animate-bounce"></i> 
                    <span>Bizi Arayın: 0532 760 05 09</span>
                </a>
            </div>

        </div>
    </nav>

    <main class="flex-grow container mx-auto p-4 md:p-6">
        
        <div class="bg-white p-6 md:p-8 rounded-3xl shadow-sm border border-gray-100 text-center max-w-3xl mx-auto my-6">
            <h2 class="text-2xl md:text-3xl font-extrabold text-slate-800">Doğru Rulmanı Saniyeler İçinde Bulun</h2>
            <p class="text-gray-500 text-sm mt-2">Sistemdeki tüm güncel marka ve distribütör stoklarında anlık arama yapın.</p>
            
            <div class="relative mt-6 max-w-xl mx-auto">
                <input type="text" id="search-box" oninput="filterProducts()" placeholder="Rulman kodu veya marka yazın... (Örn: 6204, SKF)" class="w-full p-4 pl-12 rounded-2xl border border-gray-200 shadow-sm focus:ring-2 focus:ring-amber-500 focus:outline-none text-base md:text-lg font-medium">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-5 text-gray-400 text-lg"></i>
            </div>
        </div>

        <div id="customer-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
            <div class="col-span-full text-center py-12 text-gray-400">
                <i class="fa-solid fa-spinner animate-spin text-3xl mb-2"></i>
                <p>Stoklar yükleniyor...</p>
            </div>
        </div>

    </main>

    <footer class="bg-slate-900 text-gray-400 text-center py-4 text-xs border-t border-slate-800 mt-12">
        <p>&copy; 2026 Yavuz Rulman. Tüm Hakları Saklıdır. | Akıllı B4B Altyapısı</p>
    </footer>

    <script>
        let allProducts = [];

        async function fetchAndDisplayProducts() {
            try {
                const response = await fetch('https://yavuztaspinar.github.io/rulmanpazar/urunler.json');
                if (!response.ok) throw new Error('Stok dosyası yüklenemedi.');
                allProducts = await response.json();
                renderGrid(allProducts);
            } catch (error) {
                console.error(error);
                document.getElementById('customer-grid').innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-red-200 text-red-500">
                        <i class="fa-solid fa-triangle-exclamation text-5xl mb-3"></i>
                        <p class="text-base font-semibold">Stok listesi şu anda güncelleniyor, lütfen az sonra tekrar deneyin.</p>
                    </div>`;
            }
        }

        function renderGrid(products) {
            const container = document.getElementById('customer-grid');
            container.innerHTML = "";

            if (products.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full text-center py-12 bg-white rounded-2xl border border-dashed border-gray-200 text-gray-400">
                        <i class="fa-solid fa-cubes text-5xl mb-3 text-gray-300"></i>
                        <p class="text-base font-semibold">Aradığınız kriterlere uygun rulman stoğu bulunamadı.</p>
                    </div>`;
                return;
            }

            products.forEach(item => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl border border-gray-100 shadow-sm hover:shadow-md transition-all p-5 flex flex-col justify-between">
                        <div>
                            <div class="flex justify-between items-start gap-2">
                                <h4 class="text-xl font-extrabold text-slate-900 tracking-tight">${item.code}</h4>
                                <span class="bg-slate-100 text-slate-800 text-xs font-bold px-2.5 py-1 rounded-lg uppercase border border-slate-200">${item.brand}</span>
                            </div>
                            <div class="text-xs text-gray-400 mt-1.5 flex items-center gap-1">
                                <i class="fa-solid fa-circle-nodes text-amber-500"></i> Kaynak: ${item.source}
                            </div>
                            
                            <div class="mt-5 flex items-baseline gap-1">
                                <span class="text-3xl font-black text-slate-900">${Number(item.price).toFixed(2)}</span>
                                <span class="text-sm font-bold text-gray-500">TL</span>
                            </div>
                            
                            <div class="mt-2 text-sm flex items-center gap-1.5 ${item.stock > 10 ? 'text-emerald-600 font-medium' : 'text-amber-600 font-semibold'}">
                                <i class="fa-solid fa-warehouse"></i> Anlık Stok: ${item.stock} Adet
                            </div>
                        </div>

                        <a href="https://wa.me/905327600509?text=Merhaba, Yavuz Rulman sitesinden ${item.code} - ${item.brand} rulmanı için sipariş talebimiz bulunmaktadır." target="_blank" class="mt-6 w-full bg-emerald-600 hover:bg-emerald-500 text-white text-center font-bold py-3 rounded-xl transition-all shadow-sm flex items-center justify-center gap-2 text-sm">
                            <i class="fa-brands fa-whatsapp text-lg"></i> WhatsApp ile Hızlı Sipariş
                        </a>
                    </div>`;
            });
        }

        function filterProducts() {
            const query = document.getElementById('search-box').value.toUpperCase();
            const filtered = allProducts.filter(item => 
                item.code.toUpperCase().includes(query) || 
                item.brand.toUpperCase().includes(query)
            );
            renderGrid(filtered);
        }
    </script>
</body>
</html>
