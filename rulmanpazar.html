<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RulmanPazar | Akıllı Tedarik Platformu</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 font-sans">

    <nav class="bg-blue-900 text-white shadow-lg p-4">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-wider flex items-center gap-2">
                <i class="fa-solid fa-gear animate-spin-slow"></i> RULMANPAZAR
            </h1>
            <div class="flex gap-4">
                <button onclick="toggleView('user')" class="bg-blue-700 hover:bg-blue-600 px-4 py-2 rounded-lg font-semibold transition">
                    <i class="fa-solid fa-search"></i> Müşteri Ekranı
                </button>
                <button onclick="toggleView('admin')" class="bg-amber-600 hover:bg-amber-500 px-4 py-2 rounded-lg font-semibold transition">
                    <i class="fa-solid fa-lock"></i> Stok Yönetim (B4B)
                </button>
            </div>
        </div>
    </nav>

    <div id="user-view" class="container mx-auto p-6">
        <div class="text-center my-8">
            <h2 class="text-3xl font-extrabold text-gray-800">Aradığınız Rulmanı Anında Bulun</h2>
            <p class="text-gray-500 mt-2">Entegre B4B stoklarında anlık parça numarası ve fiyat sorgulama</p>
            
            <div class="max-w-xl mx-auto mt-6 relative">
                <input type="text" id="search-input" oninput="filterProducts()" placeholder="Örn: 6204-2RSH, NU 314..." class="w-full p-4 pl-12 rounded-xl border border-gray-300 shadow-sm focus:ring-2 focus:ring-blue-500 focus:outline-none text-lg">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-5 text-gray-400 text-lg"></i>
            </div>
        </div>

        <div id="product-list" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8">
            </div>
    </div>

    <div id="admin-view" class="container mx-auto p-6 hidden">
        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <h3 class="text-xl font-bold text-gray-800 border-b pb-3 mb-4">
                <i class="fa-solid fa-plus text-amber-600"></i> Yeni Stok / B4B Verisi Ekle
            </h3>
            
            <form id="product-form" onsubmit="addProduct(event)" class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="form-code" placeholder="Rulman Kodu (Örn: 6305-ZZ)" required class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <input type="text" id="form-brand" placeholder="Marka (Örn: SKF, ORS, FAG)" required class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <input type="number" id="form-stock" placeholder="Stok Adeti" required class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <input type="number" id="form-price" placeholder="Satış Fiyatı (TL)" required class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <input type="text" id="form-source" placeholder="Kaynak (Örn: Saygılı Rulman B4B)" required class="p-3 border rounded-lg md:col-span-2 focus:ring-2 focus:ring-blue-500 focus:outline-none">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-500 text-white font-bold p-3 rounded-lg md:col-span-2 transition">
                    <i class="fa-solid fa-floppy-disk"></i> Stoğa Ekle / Güncelle
                </button>
            </form>
        </div>

        <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200 mt-8 overflow-x-auto">
            <h3 class="text-xl font-bold text-gray-800 mb-4">Sistemdeki Aktif Stoklar</h3>
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-100 border-b border-gray-200 text-gray-600 font-semibold">
                        <th class="p-3">Rulman Kodu</th>
                        <th class="p-3">Marka</th>
                        <th class="p-3">Stok</th>
                        <th class="p-3">Fiyat</th>
                        <th class="p-3">Entegre B4B Kaynağı</th>
                        <th class="p-3 text-center">İşlem</th>
                    </tr>
                </thead>
                <tbody id="admin-table-body">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        // Örnek Başlangıç Stokları (Tarayıcı hafızasında saklanacak)
        let defaultStocks = [
            { code: "6204-2RSH", brand: "SKF", stock: 120, price: 145, source: "A Distribütörü API" },
            { code: "6305-ZZ", brand: "ORS", stock: 45, price: 98, source: "B Firması XML" },
            { code: "NU 204 ECP", brand: "FAG", stock: 12, price: 420, source: "C Firması Web Scraping" }
        ];

        // Eğer tarayıcıda kayıtlı veri yoksa varsayılanları yükle
        if (!localStorage.getItem("rulman_stoklari")) {
            localStorage.setItem("rulman_stoklari", JSON.stringify(defaultStocks));
        }

        // Veriyi çek
        function getProducts() {
            return JSON.parse(localStorage.getItem("rulman_stoklari"));
        }

        // Ekranlar arası geçiş (Müşteri / Yönetim)
        function toggleView(view) {
            if (view === 'user') {
                document.getElementById('user-view').classList.remove('hidden');
                document.getElementById('admin-view').addClass('hidden');
            } else {
                document.getElementById('user-view').addClass('hidden');
                document.getElementById('admin-view').classList.remove('hidden');
                renderAdminTable();
            }
        }

        // Yardımcı fonksiyon class eklemek için (Tailwind uyumu için)
        Element.prototype.addClass = function(className) { this.classList.add(className); };

        // Müşteri ekranında listeleme ve filtreleme
        function filterProducts() {
            const query = document.getElementById('search-input').value.toUpperCase();
            const products = getProducts();
            const container = document.getElementById('product-list');
            container.innerHTML = "";

            const filtered = products.filter(p => p.code.toUpperCase().includes(query) || p.brand.toUpperCase().includes(query));

            if(filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center text-gray-400 my-8"><i class="fa-solid fa-box-open text-4xl mb-2"></i><br>Aradığınız kriterde rulman bulunamadı.</div>`;
                return;
            }

            filtered.forEach(p => {
                container.innerHTML += `
                    <div class="bg-white rounded-2xl shadow-sm hover:shadow-md border border-gray-100 p-6 flex flex-col justify-between transition">
                        <div>
                            <div class="flex justify-between items-start">
                                <h4 class="text-xl font-bold text-blue-900">${p.code}</h4>
                                <span class="bg-blue-100 text-blue-800 text-xs font-semibold px-2.5 py-0.5 rounded">${p.brand}</span>
                            </div>
                            <p class="text-sm text-gray-400 mt-1"><i class="fa-solid fa-link"></i> Veri Kaynağı: ${p.source}</p>
                            
                            <div class="mt-4 flex items-center gap-4">
                                <div class="text-3xl font-black text-emerald-600">${p.price} <span class="text-sm font-normal">TL</span></div>
                                <div class="text-sm ${p.stock > 20 ? 'text-gray-600' : 'text-amber-600 font-medium'}">
                                    <i class="fa-solid fa-warehouse"></i> Stok: ${p.stock} Adet
                                </div>
                            </div>
                        </div>
                        <a href="https://wa.me/905000000000?text=Merhaba, RulmanPazar'dan ${p.code} (${p.brand}) ürünü için sipariş/teklif almak istiyorum." target="_blank" class="mt-6 w-full bg-emerald-600 text-white text-center font-bold py-3 rounded-xl hover:bg-emerald-500 transition shadow-sm flex items-center justify-center gap-2">
                            <i class="fa-brands fa-whatsapp text-lg"></i> Satın Al / Teklif İste
                        </a>
                    </div>
                `;
            });
        }

        // Yönetim tablosunu doldur
        function renderAdminTable() {
            const products = getProducts();
            const tbody = document.getElementById('admin-table-body');
            tbody.innerHTML = "";

            products.forEach((p, index) => {
                tbody.innerHTML += `
                    <tr class="border-b border-gray-100 hover:bg-gray-50 text-gray-700">
                        <td class="p-3 font-bold">${p.code}</td>
                        <td class="p-3"><span class="bg-gray-200 text-gray-800 text-xs px-2 py-1 rounded">${p.brand}</span></td>
                        <td class="p-3">${p.stock} Adet</td>
                        <td class="p-3 font-semibold text-emerald-600">${p.price} TL</td>
                        <td class="p-3 text-sm text-gray-500">${p.source}</td>
                        <td class="p-3 text-center">
                            <button onclick="deleteProduct(${index})" class="text-red-500 hover:text-red-700 p-2">
                                <i class="fa-solid fa-trash-can"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        // Yeni Ürün Ekleme (Form gönderildiğinde)
        function addProduct(e) {
            e.preventDefault();
            const products = getProducts();

            const newProduct = {
                code: document.getElementById('form-code').value.toUpperCase(),
                brand: document.getElementById('form-brand').value.toUpperCase(),
                stock: parseInt(document.getElementById('form-stock').value),
                price: parseFloat(document.getElementById('form-price').value),
                source: document.getElementById('form-source').value
            };

            products.push(newProduct);
            localStorage.setItem("rulman_stoklari", JSON.stringify(products));
            
            document.getElementById('product-form').reset();
            renderAdminTable();
            alert("Rulman başarıyla stoğa eklendi!");
        }

        // Ürün Silme
        function deleteProduct(index) {
            if(confirm("Bu rulman stoğunu silmek istediğinize emin misiniz?")) {
                const products = getProducts();
                products.splice(index, 1);
                localStorage.setItem("rulman_stoklari", JSON.stringify(products));
                renderAdminTable();
            }
        }

        // Sayfa ilk açıldığında müşteri listesini yükle
        filterProducts();
    </script>

    <style>
        .animate-spin-slow { animation: spin 8s linear infinite; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    </style>
</body>
</html>
